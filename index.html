<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padaria Empório 27</title>
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <style> 
        body{
            background-color: #FCF6D2;
            font-family: Arial, Helvetica, sans-serif;
        }
        nav{
            background-color: #C89A34;
            width: 1243px;
            padding: 10px;
            border-radius: 2px;
        }    
        nav > a{
            color: #FCF6D2;
            padding: 10px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            transition-duration: 0.5s;
        }
        nav > a:hover{
            background-color: #597841;
            color: #FCF6D2;
        } 
        main{
            background-color: white;
            min-width: 300px;
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.258);
            margin-bottom: 30px;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        h1, h2{
            text-align: center;
        }
        main p{
            font-size: 1.1em;
            text-align: center;
            padding-bottom: 30px;
        }
        main h2{
            color: #597841;
        }
    </style>
</head>
<body>
    <header>
        <img src="imagens/logo-header.jpg" alt="Logo da empresa">
    </header>
    <nav>
        <a href="#">Nossa produção</a>
        <a href="#">Quem somos</a>
        <a href="#">Contato</a>
     </nav>
     <main>
        <article>
            <h1>NOSSAS PRODUÇÕES</h1>
            <p>Aqui na Padaria Empório 27 você encontrará diversas delicias. Conheça algumas das nossas próprias produções: </p>
            <h2>SALGADOS</h2>
        </article>
     </main>
</body>
</html>
